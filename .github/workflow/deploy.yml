name: Deploy Supabase Edge Functions

on:
  push:
    branches:
      - staging # <--- ROBOT HANYA JALAN KALAU PUSH KE STAGING
    paths:
      - "supabase/functions/**"

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Deploy lead-automation
        run: supabase functions deploy lead-automation --project-ref ${{ secrets.PROJECT_ID }}
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
